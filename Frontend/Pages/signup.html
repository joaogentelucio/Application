<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Styles/signin.css">

    <script src="https://kit.fontawesome.com/2ea8344aaa.js" crossorigin="anonymous"></script>
</head>
<body>
    <form action="">
        <i class="fa-solid fa-address-card fa-4x" style="color: #4169E1;"></i>
        <label for="nome">Nome
            <input type="text" name="nome" id="nome" required/>
            <i class="fa-solid fa-user"></i>
        </label>
        <label for="email">E-mail
            <input type="email" name="email" id="email" required/>
            <i class="fa-solid fa-envelope"></i>
        </label>
        <label for="senha">Senha
            <input type="password" name="senha" id="senha" required/>
            <i class="fa-solid fa-lock" id="togglePassword"></i>
        </label>

        <button type="submit">Entrar</button>
        <div class="footer_div">
            <span>Já tenho uma conta!
                <a href="signin.html">Entrar</a>
            </span>
        </div>
    </form>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const senhaInput = document.getElementById('senha');

        togglePassword.addEventListener('click', () => {
            // Alterna o tipo do input entre "password" e "text"
            const type = senhaInput.getAttribute('type') === 'password' ? 'text' : 'password';
            senhaInput.setAttribute('type', type);

            // Alterna o ícone do olho
            togglePassword.classList.toggle('fa-lock');
            togglePassword.classList.toggle('fa-lock-open');
        });
    </script>
</body>
</html>

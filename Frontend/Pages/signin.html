<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <link rel="stylesheet" href="/Styles/signin.css">
    <script src="https://kit.fontawesome.com/2ea8344aaa.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="login-container">
        <form class="needs-validation" novalidate>

            <i class="fas fa-user fa-4x" style="color: #aaa;"></i>
        
            <div class="input-container">
                <input type="email" name="email" placeholder="Email" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-container">
                <input type="password" id="senha" name="senha" placeholder="Senha" required>
                <i class="fas fa-eye" id="togglePassword"></i>
            </div>
            <div class="input-container">
                <input type="submit" value="ENTRAR">
            </div>
        </form>
        <div class="options">
            <p>Não tem uma conta? <a href="signup.html">Cadastre-se</a></p>
            <p><a href="#">Esqueceu sua senha?</a></p>
        </div>
    </div>
    <script src="/Scrips/signin.js"></script>
</body>
</html>
